# Test ortamına özel override'lar.
# Ortak tüm servis tanımları ../docker-compose.base.yml içindedir.
#
# Çalıştırma:
#   docker compose -f ../docker-compose.base.yml -f docker-compose.yml \
#       --env-file ../definitions.env --env-file ../definitions.test.env up -d

version: '3'
services:
  # Port publish yok: trafik nginx üzerinden yapılır (stack servisleri dış port açmaz).

  SmsService:
    environment:
      - NetgsmSettings__EndPoint=yok
      - NetgsmSettings__UserCode=111
      - NetgsmSettings__MessageHeader=11
      - NetgsmSettings__AppKey=xxx
      - NetgsmSettings__Password=xx
      - NetgsmSettings__IYSCode=xx
      - NetgsmSettings__IsTest=true

  listmonk:
    image: listmonk/listmonk:latest
    container_name: ${PROJECT_TITLE}-${DEPLOY_ENV}-listmonk-1
    restart: unless-stopped
    environment:
      LISTMONK_app__address: "0.0.0.0:9000"
      LISTMONK_db__host: ${PROJECT_TITLE}-${DEPLOY_ENV}-postgresql-1
      LISTMONK_db__port: 5432
      LISTMONK_db__user: ${POSTGRES_USER}
      LISTMONK_db__password: ${POSTGRES_PASSWORD}
      LISTMONK_db__database: MailListmonk
      LISTMONK_db__ssl_mode: disable
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-}
    volumes:
      - ${VOLUME_ROOT}/listmonk-${DEPLOY_ENV}/uploads:/listmonk/uploads
    networks:
      - appNetwork
    depends_on:
      - postgresql

networks:
  appNetwork:
    name: ${NETWORK_NAME}
    external: true